version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: saude_db
      POSTGRES_USER: saude
      POSTGRES_PASSWORD: saude123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saude_db
      DB_USER: saude
      DB_PASSWORD: saude123
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
